# A股智能选股助手 — GitHub Actions 定时运行
# 每天北京时间 18:00 (UTC 10:00) 自动运行，盘后数据就绪后执行

name: A股每日选股

on:
  schedule:
    # 北京时间 18:00 = UTC 10:00（盘后数据全部就绪）
    - cron: '0 10 * * 1-5'    # 周一至周五
  workflow_dispatch:            # 允许手动触发
    inputs:
      date:
        description: '指定日期 (YYYY-MM-DD，留空为最新交易日)'
        required: false

jobs:
  stock-scan:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install akshare pandas numpy pyyaml rich requests

      - name: 运行选股分析
        id: run
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          RUN_DATE: ${{ inputs.date || '' }}
        run: |
          # 如果配置了 SENDKEY，启用推送
          if [ -n "$SENDKEY" ]; then
            sed -i "s/enabled: false/enabled: true/" config.yaml
            sed -i "s/sendkey: \"\"/sendkey: \"$SENDKEY\"/" config.yaml
            echo "Server酱推送已启用"
          fi

          # 运行分析
          if [ -n "$RUN_DATE" ]; then
            python run.py --date "$RUN_DATE"
          else
            python run.py
          fi

      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: reports/*.md
          retention-days: 30
