<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股智能选股助手</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #0d1117; color: #c9d1d9; min-height: 100vh;
        }
        .header {
            background: #161b22; border-bottom: 1px solid #30363d;
            padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { font-size: 22px; color: #58a6ff; }
        .header .date { color: #8b949e; font-size: 14px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px 40px; }
        .controls { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; }
        .btn {
            padding: 10px 24px; border: 1px solid #30363d; border-radius: 6px;
            background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 14px;
            transition: all 0.2s;
        }
        .btn:hover { background: #30363d; border-color: #58a6ff; }
        .btn.primary { background: #238636; border-color: #2ea043; color: #fff; }
        .btn.primary:hover { background: #2ea043; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .section-title {
            font-size: 18px; font-weight: bold; margin: 24px 0 12px;
            padding-bottom: 8px; border-bottom: 2px solid #30363d;
        }
        .section-title.short { color: #f0883e; border-color: #f0883e; }
        .section-title.mid { color: #58a6ff; border-color: #58a6ff; }
        table {
            width: 100%; border-collapse: collapse; margin-bottom: 24px;
            background: #161b22; border-radius: 8px; overflow: hidden;
        }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #21262d; }
        th { background: #21262d; color: #8b949e; font-weight: 600; font-size: 12px; text-transform: uppercase; }
        td { font-size: 14px; }
        tr:hover td { background: #1c2128; }
        .score-high { color: #3fb950; font-weight: bold; }
        .score-mid { color: #d29922; }
        .score-low { color: #f85149; }
        .pct-up { color: #f85149; }
        .pct-down { color: #3fb950; }
        .empty-state {
            text-align: center; padding: 48px; color: #484f58;
            background: #161b22; border-radius: 8px;
        }
        .spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 3px solid #30363d; border-top-color: #58a6ff;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px; }
        .chart-box { background: #161b22; border-radius: 8px; padding: 16px; height: 360px; }
        .toast { position: fixed; bottom: 24px; right: 24px; background: #238636; color: white;
                 padding: 12px 24px; border-radius: 8px; display: none; z-index: 1000; }
        .toast.error { background: #da3633; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔬 A股智能选股助手</h1>
        <span class="date" id="currentDate"></span>
    </div>

    <div class="container">
        <div class="controls">
            <button class="btn primary" onclick="runAnalysis()" id="btnRun">
                🚀 运行分析
            </button>
            <button class="btn" onclick="loadHistory()">📋 历史报告</button>
            <span id="status" style="color: #8b949e; font-size: 13px;"></span>
        </div>

        <div id="shortSection">
            <div class="section-title short">⚡ 短线精选</div>
            <div id="shortContent"></div>
        </div>

        <div id="midSection">
            <div class="section-title mid">🏔️ 中线趋势股</div>
            <div id="midContent"></div>
        </div>

        <div id="charts">
            <div class="chart-box" id="chartScores"></div>
            <div class="chart-box" id="chartSectors"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN');

        async function runAnalysis() {
            const btn = document.getElementById('btnRun');
            const status = document.getElementById('status');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> 分析中...';
            status.textContent = '正在获取数据，请稍候...';

            try {
                const resp = await fetch('/api/run');
                const data = await resp.json();
                renderShortTerm(data.short_term || []);
                renderMidTerm(data.mid_term || []);
                renderCharts(data);
                status.textContent = '✅ 分析完成 ' + new Date().toLocaleTimeString();
                showToast('分析完成！');
            } catch (err) {
                status.textContent = '❌ 分析失败: ' + err.message;
                showToast('分析失败: ' + err.message, true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 运行分析';
            }
        }

        function renderShortTerm(stocks) {
            const container = document.getElementById('shortContent');
            if (!stocks || stocks.length === 0) {
                container.innerHTML = '<div class="empty-state">⚠️ 今日无短线推荐（无股票通过筛选条件）</div>';
                return;
            }

            let html = '<table><thead><tr>';
            html += '<th>#</th><th>代码</th><th>名称</th><th>总分</th><th>涨跌幅</th><th>资金面</th><th>情绪面</th><th>技术面</th><th>入选理由</th>';
            html += '</tr></thead><tbody>';

            stocks.forEach((s, i) => {
                const total = s.total_score || 0;
                const cls = total >= 70 ? 'score-high' : total >= 50 ? 'score-mid' : 'score-low';
                const pct = s.pct_change || 0;
                const pctCls = pct >= 0 ? 'pct-up' : 'pct-down';

                html += `<tr>
                    <td>${i + 1}</td>
                    <td>${s.code || '-'}</td>
                    <td><strong>${s.name || '-'}</strong></td>
                    <td class="${cls}">${total.toFixed(1)}</td>
                    <td class="${pctCls}">${pct > 0 ? '+' : ''}${pct.toFixed(2)}%</td>
                    <td>${(s.score_capital || 0).toFixed(0)}</td>
                    <td>${(s.score_sentiment || 0).toFixed(0)}</td>
                    <td>${(s.score_technical || 0).toFixed(0)}</td>
                    <td><small>${getReason(s)}</small></td>
                </tr>`;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function renderMidTerm(stocks) {
            const container = document.getElementById('midContent');
            if (!stocks || stocks.length === 0) {
                container.innerHTML = '<div class="empty-state">💤 今日无中线推荐（无股票达到评分阈值）<br><small>中线选股宁缺毋滥——只有趋势+基本面+资金面同时共振时才会触发推荐。</small></div>';
                return;
            }

            let html = '<table><thead><tr>';
            html += '<th>#</th><th>代码</th><th>名称</th><th>总分</th><th>趋势</th><th>基本面</th><th>资金沉淀</th><th>行业景气</th><th>核心理由</th>';
            html += '</tr></thead><tbody>';

            stocks.forEach((s, i) => {
                const total = s.total_score || 0;
                const cls = total >= 75 ? 'score-high' : total >= 60 ? 'score-mid' : 'score-low';
                html += `<tr>
                    <td>${i + 1}</td>
                    <td>${s.code || '-'}</td>
                    <td><strong>${s.name || '-'}</strong></td>
                    <td class="${cls}">${total.toFixed(1)}</td>
                    <td>${(s.score_trend || 0).toFixed(0)}</td>
                    <td>${(s.score_fundamentals || 0).toFixed(0)}</td>
                    <td>${(s.score_capital_acc || 0).toFixed(0)}</td>
                    <td>${(s.score_industry || 0).toFixed(0)}</td>
                    <td><small>${getMidReason(s)}</small></td>
                </tr>`;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function renderCharts(data) {
            // 评分雷达图
            const scoreDom = document.getElementById('chartScores');
            if (scoreDom) {
                const chart = echarts.init(scoreDom);
                const st = data.short_term || [];
                chart.setOption({
                    title: { text: '短线推荐评分分布', textStyle: { color: '#c9d1d9', fontSize: 14 } },
                    tooltip: { trigger: 'axis' },
                    xAxis: { type: 'category', data: st.slice(0,8).map(s => s.name || s.code), axisLabel: { color: '#8b949e' } },
                    yAxis: { type: 'value', max: 100, axisLabel: { color: '#8b949e' } },
                    series: [
                        { name: '资金面', type: 'bar', data: st.slice(0,8).map(s => s.score_capital || 0), itemStyle: { color: '#f0883e' } },
                        { name: '情绪面', type: 'bar', data: st.slice(0,8).map(s => s.score_sentiment || 0), itemStyle: { color: '#d29922' } },
                        { name: '技术面', type: 'bar', data: st.slice(0,8).map(s => s.score_technical || 0), itemStyle: { color: '#58a6ff' } },
                        { name: '流通性', type: 'bar', data: st.slice(0,8).map(s => s.score_liquidity || 0), itemStyle: { color: '#3fb950' } },
                    ],
                    legend: { textStyle: { color: '#8b949e' } },
                });
            }

            // 行业分布
            const sectorDom = document.getElementById('chartSectors');
            if (sectorDom) {
                const chart = echarts.init(sectorDom);
                const sectors = {};
                (data.short_term || []).forEach(s => {
                    const ind = s.industry || '其他';
                    sectors[ind] = (sectors[ind] || 0) + 1;
                });
                const pieData = Object.entries(sectors).map(([name, value]) => ({ name, value }));
                chart.setOption({
                    title: { text: '推荐股票行业分布', textStyle: { color: '#c9d1d9', fontSize: 14 } },
                    tooltip: { trigger: 'item' },
                    series: [{
                        type: 'pie',
                        radius: ['30%', '70%'],
                        data: pieData,
                        label: { color: '#8b949e' },
                    }],
                });
            }
        }

        async function loadHistory() {
            const resp = await fetch('/api/history');
            const data = await resp.json();
            if (data.reports && data.reports.length > 0) {
                const latest = data.reports[0].date;
                const resp2 = await fetch(`/api/report/${latest}`);
                const report = await resp2.json();
                if (report.content) {
                    document.getElementById('status').textContent =
                        `📄 最近报告: ${latest} (长度: ${report.content.length} 字)`;
                }
            } else {
                document.getElementById('status').textContent = '暂无历史报告';
            }
        }

        function getReason(s) {
            const parts = [];
            if (s.consecutive >= 2) parts.push(s.consecutive + '连板');
            if (s.pct_change >= 9) parts.push('涨停');
            if (s.score_capital >= 65) parts.push('主力流入');
            if (s.dragon_tiger_net > 0) parts.push('龙虎榜净买');
            return parts.join('+') || '多因子共振';
        }

        function getMidReason(s) {
            const parts = [];
            if (s.score_trend >= 65) parts.push('趋势多头');
            if (s.score_fundamentals >= 60) parts.push('基本面优');
            if (s.north_flow_days >= 10) parts.push('北向流入');
            return parts.join('+') || '中长期配置';
        }

        function showToast(msg, isError) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }
    </script>
</body>
</html>
