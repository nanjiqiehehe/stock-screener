name: stock-screener-daily
displayName: A股每日选股

triggers:
  push:
    branches:
      - main
  schedule:
    - cron: '0 10 * * 1-5'

stages:
  - name: stage-1
    displayName: 选股分析
    jobs:
      - name: run-analysis
        displayName: 运行
        steps:
          - name: step-install
            displayName: 安装依赖
            image: python:3.12
            shell: bash
            script: |
              pip install akshare pandas numpy pyyaml rich requests
          - name: step-scan
            displayName: 执行选股
            shell: bash
            script: |
              python run.py
