<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股智能选股日报</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Microsoft YaHei',-apple-system,sans-serif;background:#0a0e17;color:#e0e6ed;min-height:100vh}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.container{max-width:1300px;margin:0 auto;padding:24px 32px;position:relative;z-index:1}
.header{background:linear-gradient(135deg,#0d1321 0%,#1a1f35 100%);border:1px solid #1e2a45;border-radius:16px;padding:28px 36px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:26px;font-weight:700;background:linear-gradient(135deg,#4ea8ff,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .meta{text-align:right;color:#6b7c93;font-size:13px}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin:0 4px}
.badge-up{background:rgba(239,68,68,.15);color:#ef4444}
.badge-down{background:rgba(34,197,94,.15);color:#22c55e}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:#111827;border:1px solid #1e2a45;border-radius:12px;padding:20px}
.card .label{font-size:12px;color:#6b7c93;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.card .value{font-size:28px;font-weight:700}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.grid2 .panel{background:#111827;border:1px solid #1e2a45;border-radius:12px;padding:20px}
.panel-title{font-size:16px;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #1e2a45;display:flex;align-items:center;gap:8px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;font-size:11px;color:#6b7c93;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #1e2a45}
td{padding:12px;font-size:13px;border-bottom:1px solid #151b2a}
tr:hover td{background:rgba(78,168,255,.04)}
.rank{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.rank-1{background:#f59e0b}.rank-2{background:#6b7280}.rank-3{background:#92400e}
.score-bar{display:inline-block;height:6px;border-radius:3px;margin-right:6px;vertical-align:middle}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin:1px 2px}
.tag-hot{background:rgba(239,68,68,.12);color:#ef4444}
.tag-up{background:rgba(34,197,94,.12);color:#22c55e}
.tag-border{background:rgba(78,168,255,.12);color:#4ea8ff}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.chart-box{background:#111827;border:1px solid #1e2a45;border-radius:12px;padding:16px;height:380px}
.footer{text-align:center;padding:32px;color:#374151;font-size:12px}
.empty{text-align:center;padding:48px;color:#374151}
@media(max-width:768px){.grid2,.charts{grid-template-columns:1fr}}
</style>
</head>
<body>
<canvas class="particles" id="bg"></canvas>

<div class="container" id="app">
  <div class="header">
    <div>
      <h1>🔬 A股智能选股日报</h1>
    </div>
    <div class="meta">
      <div id="reportDate"></div>
      <div id="reportTime" style="margin-top:4px"></div>
    </div>
  </div>

  <div class="cards" id="marketCards"></div>

  <div class="grid2">
    <div class="panel" style="border-left:3px solid #f0883e">
      <div class="panel-title">⚡ 短线精选 (<span id="stCount">-</span>)</div>
      <div style="overflow-x:auto">
        <table id="stTable"><tbody></tbody></table>
      </div>
    </div>
    <div class="panel" style="border-left:3px solid #58a6ff">
      <div class="panel-title">🏔️ 中线趋势 (<span id="mtCount">-</span>)</div>
      <div style="overflow-x:auto">
        <table id="mtTable"><tbody></tbody></table>
      </div>
    </div>
  </div>

  <div class="charts">
    <div class="chart-box" id="chart1"></div>
    <div class="chart-box" id="chart2"></div>
  </div>

  <div class="footer">
    ⚠️ 量化辅助研究工具 · 不构成投资建议 · 股市有风险投资需谨慎 · 🤖 每日18:00自动更新
  </div>
</div>

<script>
// Background particles
(function(){
  var c=document.getElementById('bg'),ctx=c.getContext('2d'),w,h,ps=[];
  function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  for(var i=0;i<80;i++)ps.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+0.5,vx:(Math.random()-0.5)*0.4,vy:(Math.random()-0.5)*0.4,o:Math.random()*0.3+0.1});
  function draw(){
    ctx.clearRect(0,0,w,h);
    for(var i=0;i<ps.length;i++){
      var p=ps[i];p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(78,168,255,'+p.o+')';ctx.fill();
      for(var j=i+1;j<ps.length;j++){
        var d=Math.hypot(p.x-ps[j].x,p.y-ps[j].y);
        if(d<100){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(ps[j].x,ps[j].y);ctx.strokeStyle='rgba(78,168,255,'+(0.06*(1-d/100))+')';ctx.stroke()}
      }
    }
    requestAnimationFrame(draw)
  }
  draw()
})();

// Data
var DATA = {"short_term":[],"mid_term":[],"market":{}};

// Load report data from URL parameter or localStorage
function loadData() {
  var stored = localStorage.getItem('daily-report');
  if (stored) {
    DATA = JSON.parse(stored);
    render();
  }
  // Also try to load from reports directory
  fetch('report.json').then(r=>r.json()).then(d=>{
    DATA = d; localStorage.setItem('daily-report',JSON.stringify(d)); render();
  }).catch(()=>render());
}

function getRankClass(i) {
  if (i===1) return 'rank rank-1';
  if (i===2) return 'rank rank-2';
  if (i===3) return 'rank rank-3';
  return 'rank';
}

function scoreColor(s) {
  if (s>=50) return '#3fb950';
  if (s>=40) return '#d29922';
  if (s>=30) return '#f0883e';
  return '#f85149';
}

function getTags(row) {
  var t=[];
  if (row.consecutive>=2) t.push('<span class="tag tag-hot">'+row.consecutive+'连板</span>');
  if (row.pct_change>=20) t.push('<span class="tag tag-hot">20cm</span>');
  if (row.pct_change>=9) t.push('<span class="tag tag-up">涨停</span>');
  if (row.score_capital>=65) t.push('<span class="tag tag-border">主力流入</span>');
  if (row.dragon_tiger_net>0) t.push('<span class="tag tag-border">龙虎榜</span>');
  return t.join(' ');
}

function getMidTags(row) {
  var t=[];
  if (row.score_trend>=65) t.push('<span class="tag tag-up">趋势↑</span>');
  if (row.score_fundamentals>=60) t.push('<span class="tag tag-border">基本面优</span>');
  if (row.north_flow_days>=10) t.push('<span class="tag tag-border">北向流入</span>');
  return t.join(' ');
}

function render() {
  var d=new Date();
  document.getElementById('reportDate').textContent = d.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  document.getElementById('reportTime').textContent = '🤖 每日18:00自动更新';

  // Market cards
  var m = DATA.market || {};
  var cards = document.getElementById('marketCards');
  var up = m.up_count||'-', down = m.down_count||'-', avg = m.avg_change||'-';
  cards.innerHTML =
    '<div class="card"><div class="label">上涨家数</div><div class="value" style="color:#ef4444">'+up+'</div></div>'+
    '<div class="card"><div class="label">下跌家数</div><div class="value" style="color:#22c55e">'+down+'</div></div>'+
    '<div class="card"><div class="label">平均涨跌幅</div><div class="value">'+avg+'</div></div>'+
    '<div class="card"><div class="label">更新时间</div><div class="value" style="font-size:18px">'+d.toLocaleTimeString('zh-CN')+'</div></div>';

  // Short term
  var st = DATA.short_term || [];
  document.getElementById('stCount').textContent = st.length||'-';
  var stHtml = '';
  if (st.length) {
    stHtml += '<thead><tr><th>#</th><th>代码</th><th>名称</th><th>评分</th><th>涨跌幅</th><th>资金</th><th>技术</th><th>标签</th></tr></thead>';
    stHtml += '<tbody>';
    st.forEach(function(s,i){
      var sc = s.total_score||0;
      var pct = s.pct_change||0;
      stHtml += '<tr>'+
        '<td><div class="'+getRankClass(i+1)+'">'+(i+1)+'</div></td>'+
        '<td style="font-family:monospace;color:#4ea8ff">'+s.code+'</td>'+
        '<td><b>'+s.name+'</b></td>'+
        '<td><span style="color:'+scoreColor(sc)+';font-weight:700">'+sc.toFixed(1)+'</span></td>'+
        '<td style="color:'+(pct>=0?'#ef4444':'#22c55e')+';font-weight:600">'+(pct>0?'+':'')+pct.toFixed(2)+'%</td>'+
        '<td>'+(s.score_capital||0).toFixed(0)+'</td>'+
        '<td>'+(s.score_technical||0).toFixed(0)+'</td>'+
        '<td>'+getTags(s)+'</td>'+
        '</tr>';
    });
    stHtml += '</tbody>';
  }
  document.getElementById('stTable').innerHTML = stHtml || '<tr><td colspan="8" class="empty">今日无短线推荐</td></tr>';

  // Mid term
  var mt = DATA.mid_term || [];
  document.getElementById('mtCount').textContent = mt.length||'-';
  var mtHtml = '';
  if (mt.length) {
    mtHtml += '<thead><tr><th>#</th><th>代码</th><th>名称</th><th>评分</th><th>趋势</th><th>基本面</th><th>资金沉淀</th><th>标签</th></tr></thead>';
    mtHtml += '<tbody>';
    mt.forEach(function(s,i){
      var sc = s.total_score||0;
      mtHtml += '<tr>'+
        '<td><div class="'+getRankClass(i+1)+'">'+(i+1)+'</div></td>'+
        '<td style="font-family:monospace;color:#4ea8ff">'+s.code+'</td>'+
        '<td><b>'+s.name+'</b></td>'+
        '<td><span style="color:'+scoreColor(sc)+';font-weight:700">'+sc.toFixed(1)+'</span></td>'+
        '<td>'+(s.score_trend||0).toFixed(0)+'</td>'+
        '<td>'+(s.score_fundamentals||0).toFixed(0)+'</td>'+
        '<td>'+(s.score_capital_acc||0).toFixed(0)+'</td>'+
        '<td>'+getMidTags(s)+'</td>'+
        '</tr>';
    });
    mtHtml += '</tbody>';
  }
  document.getElementById('mtTable').innerHTML = mtHtml || '<tr><td colspan="8" class="empty">今日无中线推荐（无股票达标）</td></tr>';

  // Charts
  renderCharts(st);
}

function renderCharts(st) {
  var c1 = echarts.init(document.getElementById('chart1'));
  c1.setOption({
    title:{text:'短线评分雷达',textStyle:{color:'#e0e6ed',fontSize:14},left:'center'},
    tooltip:{trigger:'item'},
    legend:{bottom:0,textStyle:{color:'#6b7c93',fontSize:10}},
    radar:{
      center:['50%','45%'],
      radius:'65%',
      indicator:[
        {name:'资金面',max:100},{name:'情绪面',max:100},{name:'技术面',max:100},{name:'流通性',max:100}
      ],
      axisName:{color:'#6b7c93'},
      splitArea:{areaStyle:{color:['rgba(78,168,255,0.02)','rgba(78,168,255,0.04)']}}
    },
    series:[{
      type:'radar',
      data:st.slice(0,5).map(function(s,i){
        return {
          value:[s.score_capital||0,s.score_sentiment||0,s.score_technical||0,s.score_liquidity||0],
          name:s.name||s.code,
          areaStyle:{opacity:0.15},
          lineStyle:{width:2}
        }
      })
    }]
  });

  var sectors = {};
  st.forEach(function(s){var ind=s.industry||'其他';sectors[ind]=(sectors[ind]||0)+1});
  var pieData = Object.entries(sectors).map(function(e){return{name:e[0],value:e[1]}});

  var c2 = echarts.init(document.getElementById('chart2'));
  c2.setOption({
    title:{text:'行业分布',textStyle:{color:'#e0e6ed',fontSize:14},left:'center'},
    tooltip:{trigger:'item'},
    series:[{
      type:'pie',radius:['35%','70%'],center:['50%','48%'],
      data:pieData,
      label:{color:'#6b7c93',fontSize:10},
      itemStyle:{borderColor:'#0a0e17',borderWidth:2}
    }]
  });
}

window.onload = loadData;
window.addEventListener('resize',function(){
  echarts.getInstanceByDom(document.getElementById('chart1'))?.resize();
  echarts.getInstanceByDom(document.getElementById('chart2'))?.resize();
});
</script>
</body>
</html>
